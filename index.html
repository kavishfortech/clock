<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IST Digital Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000;
            margin: 0;
            font-family: monospace;
            color: #FFFFFF;
        }

        #clock {
            font-size: 4rem;
            padding: 20px;
            background-color: #454545;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div id="clock"></div>

    <script>
function showTime() {
const now = new Date();

// Format the time string
const timeString = now.toLocaleTimeString('en-IN', {
timeZone: 'Asia/Kolkata',
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: true
});

// Split the time and the AM/PM part
// Example: "10:30:05 am" -> ["10:30:05", "am"]
const [time, period] = timeString.split(' ');

// Update the innerHTML to include the <sup> tag for the period
document.getElementById('clock').innerHTML = `${time}<sup>${period}</sup>`;
}

// Update every second
setInterval(showTime, 1000);
showTime(); // Initial call
</script>
</body>
</html>
