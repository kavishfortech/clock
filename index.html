<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscape Clock</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
            overflow: hidden; /* Prevents scrolling */
        }

        .clock-box {
            background-color: #444;
            padding: 10px 25px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            color: #fff;
        }

        #time {
            font-size: 5rem;
            font-weight: 500;
        }

        sup {
            font-size: 2.5rem;
            margin-left: 5px;
            text-transform: uppercase;
            vertical-align: super;
        }

        /* --- LANDSCAPE ENFORCEMENT CODE --- */
        
        /* This div is hidden by default */
        .rotate-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* If the device is in Portrait mode, show the warning and hide the clock */
        @media screen and (orientation: portrait) {
            .rotate-warning {
                display: flex;
            }
            .clock-box {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="rotate-warning">
        <h1>🔄</h1>
        <p>Please rotate your device to Landscape mode</p>
    </div>

    <div class="clock-box">
        <div id="time"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const options = {
                timeZone: 'Asia/Kolkata',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            
            const timeParts = now.toLocaleTimeString('en-IN', options).split(' ');
            const timeString = timeParts[0];
            const ampm = timeParts[1];

            document.getElementById('time').innerHTML = `${timeString}<sup>${ampm}</sup>`;
        }

        setInterval(updateClock, 1000);
        updateClock();
        
        // v32
    </script>
</body>
</html>
